<svg width="400" height="400" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Hard Shadow -->
  <rect x="20" y="20" width="160" height="160" rx="36" fill="#111111" />
  
  <!-- Main Card Body -->
  <rect x="10" y="10" width="160" height="160" rx="36" fill="white" stroke="#111111" stroke-width="8" />
  
  <!-- "形" (Katachi) Stylized Kanji -->
  <g transform="translate(42, 45)">
    <!-- Radical: Static/Solid side -->
    <path d="M5 20 H45" stroke="#111111" stroke-width="12" stroke-linecap="square" />
    <path d="M5 45 H45" stroke="#111111" stroke-width="12" stroke-linecap="square" />
    <path d="M18 5 V65" stroke="#111111" stroke-width="12" stroke-linecap="square" />
    <path d="M35 5 V65" stroke="#111111" stroke-width="12" stroke-linecap="square" />
    
    <!-- Movement Radical: Dynamic/Conjugation side -->
    <!-- First Stroke: Accent Shu Red -->
    <path d="M70 12 L100 40" stroke="#FF3B22" stroke-width="14" stroke-linecap="round" />
    <!-- Second Stroke: Black -->
    <path d="M65 38 L95 66" stroke="#111111" stroke-width="14" stroke-linecap="round" />
    <!-- Third Stroke: Black -->
    <path d="M60 64 L90 92" stroke="#111111" stroke-width="14" stroke-linecap="round" />
  </g>
  
  <!-- Brand Text -->
  <text x="94" y="152" text-anchor="middle" fill="#111111" font-family="sans-serif" font-weight="900" font-size="10" letter-spacing="0.45em">KATACHI</text>
</svg>
