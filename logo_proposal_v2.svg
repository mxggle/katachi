<svg width="400" height="400" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Neobrutalist Shadow -->
  <rect x="20" y="20" width="160" height="160" rx="28" fill="#111111" />
  
  <!-- Main Card Body -->
  <rect x="10" y="10" width="160" height="160" rx="28" fill="white" stroke="#111111" stroke-width="8" />
  
  <!-- "形" Kanji - Adjusted position to avoid overlap -->
  <text 
    x="50%" 
    y="48%" 
    text-anchor="middle" 
    dominant-baseline="middle" 
    fill="#111111" 
    font-family="system-ui, 'Hiragino Sans', 'MS Mincho', serif" 
    font-weight="900" 
    font-size="85"
  >形</text>
  
  <!-- Red accent dot - positioned more intentionally -->
  <circle cx="142" cy="38" r="10" fill="#FF3B22" stroke="#111111" stroke-width="4" />

  <!-- Brand Subtext - Moved lower and clarified -->
  <text 
    x="50%" 
    y="162" 
    text-anchor="middle" 
    fill="#111111" 
    font-family="sans-serif" 
    font-weight="900" 
    font-size="11" 
    letter-spacing="0.4em"
  >KATACHI</text>
</svg>
